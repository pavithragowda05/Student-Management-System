<!DOCTYPE html>
<html>

<head>

    <title>Add Student</title>

   <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="{{ url_for('static', filename='js/script.js') }}"></script>

</head>

<body>
<form action="/save" method="POST" onsubmit="return saveRecord()">
<div class="container mt-5">

<h1>Add Student</h1>

<input class="form-control" type="text" name="usn" placeholder="Enter USN" id="usn" oninput="this.value = this.value.toUpperCase()"><br><br>

<input class="form-control" type="text" name="name" placeholder="Enter Name" id="name" oninput="this.value = this.value.toUpperCase()"><br><br>

<input class="form-control" type="text" name="year" placeholder="Academic Year" id="year"><br><br>

<input class="form-control" type="text" name="cgpa" placeholder="Enter CGPA" id="cgpa">

<button class="btn btn-primary" type="submit">Save student</button>

<br><br>

<button class="btn btn-primary" type="button" onclick="window.location.href='/'">
    Home
</button>

</div>
</form>
</body>

</html>
