<!DOCTYPE html>
<html>

<head>

<title>Display Students</title>

<link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">

</head>

<body>

<div class="container">

<h1>Student Records</h1>

<table border="1">

<tr>

<th>USN</th>
<th>Name</th>
<th>Year</th>
<th>CGPA</th>

</tr>

{% for student in students %}
    <tr>
        <td>{{ student[0] }}</td>
        <td>{{ student[1] }}</td>
        <td>{{ student[2] }}</td>
        <td>{{ student[3] }}</td>
    </tr>
    {% endfor %}


</table>

<br>

<a href="/">
<button>Home</button>
</a>

</div>

</body>

</html>
