<!DOCTYPE html>
<html>

<head>

<title>Search Student</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css" rel="stylesheet">
<script src="{{ url_for('static', filename='js/script.js') }}"></script>

</head>

<body>
<form action="/searchdata" method="POST">
    <div class="container mt-5">
    <input type="text" class="form-control" name="usn" placeholder="Enter USN">
    <button class="btn btn-primary" type="submit">Search</button>
</form>
<br><br>


    <h1>Student Records</h1>

<table border="1">

<tr>

<th>USN</th>
<th>Name</th>
<th>Year</th>
<th>CGPA</th>

</tr>

{% if student %}
<tr>
    <td>{{ student[0] }}</td>
    <td>{{ student[1] }}</td>
    <td>{{ student[2] }}</td>
    <td>{{ student[3] }}</td>
</tr>
{% else %}
<tr>
    <td colspan="4">No student found.</td>
</tr>
{% endif %}

</table>

<br>
<button class="btn btn-primary" type="button" onclick="window.location.href='/'">
    Home
</button>
</div>

</body>

</html>
